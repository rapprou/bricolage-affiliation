<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f3f4f6"/>
  <!-- Corps de la perceuse -->
  <rect x="140" y="130" width="90" height="55" rx="10" fill="#6b7280"/>
  <!-- Poignée -->
  <rect x="165" y="185" width="40" height="70" rx="8" fill="#4b5563"/>
  <!-- Mandrin / tête -->
  <rect x="230" y="148" width="50" height="20" rx="5" fill="#9ca3af"/>
  <!-- Mèche -->
  <rect x="278" y="154" width="45" height="8" rx="3" fill="#374151"/>
  <!-- Bouton gâchette -->
  <ellipse cx="185" cy="185" rx="10" ry="6" fill="#d1d5db"/>
  <!-- Batterie -->
  <rect x="155" y="252" width="60" height="22" rx="6" fill="#374151"/>
  <rect x="175" y="248" width="20" height="6" rx="3" fill="#4b5563"/>
  <!-- Texte -->
  <text x="200" y="345" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#6b7280" text-anchor="middle">Perceuse</text>
</svg>
