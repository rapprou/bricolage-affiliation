<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f3f4f6"/>
  <!-- Corps compact de la visseuse -->
  <rect x="145" y="135" width="80" height="50" rx="10" fill="#6b7280"/>
  <!-- Poignée pistolet -->
  <rect x="165" y="185" width="38" height="65" rx="8" fill="#4b5563"/>
  <!-- Tête embout -->
  <rect x="225" y="150" width="40" height="18" rx="5" fill="#9ca3af"/>
  <!-- Embout cruciforme -->
  <rect x="263" y="155" width="30" height="6" rx="2" fill="#374151"/>
  <rect x="274" y="146" width="6" height="24" rx="2" fill="#374151"/>
  <!-- Sélecteur couple -->
  <circle cx="165" cy="145" r="10" fill="#d1d5db" stroke="#9ca3af" stroke-width="2"/>
  <!-- Batterie -->
  <rect x="155" y="247" width="55" height="20" rx="6" fill="#374151"/>
  <rect x="172" y="243" width="18" height="6" rx="3" fill="#4b5563"/>
  <!-- Texte -->
  <text x="200" y="345" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#6b7280" text-anchor="middle">Visseuse</text>
</svg>
