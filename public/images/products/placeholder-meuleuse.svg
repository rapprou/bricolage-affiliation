<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f3f4f6"/>
  <!-- Corps de la meuleuse (allongé horizontal) -->
  <rect x="110" y="165" width="170" height="50" rx="10" fill="#6b7280"/>
  <!-- Garde de protection (demi-cercle) -->
  <path d="M 110 190 A 50 50 0 0 0 110 240 L 160 240 L 160 190 Z" fill="#4b5563"/>
  <!-- Disque de meulage -->
  <circle cx="135" cy="215" r="38" fill="none" stroke="#9ca3af" stroke-width="6"/>
  <circle cx="135" cy="215" r="8" fill="#9ca3af"/>
  <!-- Poignée latérale -->
  <rect x="268" y="178" width="40" height="22" rx="8" fill="#4b5563"/>
  <!-- Bouton on/off -->
  <rect x="195" y="172" width="30" height="14" rx="4" fill="#374151"/>
  <!-- Texte -->
  <text x="200" y="345" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#6b7280" text-anchor="middle">Meuleuse</text>
</svg>
